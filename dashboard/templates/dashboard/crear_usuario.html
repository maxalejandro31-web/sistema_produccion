{% extends 'base.html' %}
{% block title %}Crear Usuario{% endblock %}

{% block breadcrumbs %}
<div class="breadcrumbs">
    <a href="{% url 'inicio' %}">Dashboard</a><span class="sep">›</span>
    <a href="{% url 'lista_usuarios' %}">Usuarios</a><span class="sep">›</span>
    <span class="current">Crear Usuario</span>
</div>
{% endblock %}

{% block content %}
<style>
    .card-form { max-width:520px; margin:30px auto; background:white; border-radius:14px;
                 padding:36px; box-shadow:0 3px 16px rgba(0,0,0,0.09); }
    .card-form h1 { margin-top:0; font-size:22px; color:#1f2d3d; margin-bottom:24px; }
    label { display:block; font-size:13px; font-weight:600; color:#374151; margin-bottom:5px; }
    input[type=text], input[type=password], select {
        width:100%; padding:10px 12px; border:1px solid #d1d5db;
        border-radius:8px; font-size:14px; box-sizing:border-box; margin-bottom:16px;
        background:white;
    }
    input:focus, select:focus { outline:none; border-color:#1f2d3d; }
    .check-row { display:flex; align-items:center; gap:10px; margin-bottom:16px; }
    .check-row input { width:auto; margin:0; }
    .check-row label { margin:0; font-weight:normal; }
    .btn-submit { width:100%; padding:12px; background:#1f2d3d; color:white;
                  border:none; border-radius:9px; font-size:15px; font-weight:bold; cursor:pointer; }
    .btn-submit:hover { background:#2c3e50; }
    .btn-cancel { display:block; text-align:center; margin-top:12px; color:#6b7280;
                  text-decoration:none; font-size:14px; }
    .error-msg { background:#fee2e2; color:#991b1b; border:1px solid #fca5a5;
                 border-radius:8px; padding:11px 14px; margin-bottom:16px; font-size:14px; }
    .hint { font-size:12px; color:#9ca3af; margin-top:-12px; margin-bottom:16px; }
    .divider { border:none; border-top:1px solid #e5e7eb; margin:20px 0; }
</style>

<div class="card-form">
    <h1>➕ Crear nuevo usuario</h1>

    {% if error %}<div class="error-msg">❌ {{ error }}</div>{% endif %}

    <form method="POST">
        {% csrf_token %}

        <label>Nombre de usuario</label>
        <input type="text" name="username" required autofocus placeholder="ej. jperez">

        <label>Contraseña</label>
        <input type="password" name="password" required>
        <p class="hint">Mínimo 6 caracteres.</p>

        <label>Confirmar contraseña</label>
        <input type="password" name="password2" required>

        <hr class="divider">

        <label>Rol / Grupo</label>
        <select name="grupo">
            <option value="">— Sin grupo —</option>
            {% for g in grupos %}
            <option value="{{ g.id }}">{{ g.name }}</option>
            {% endfor %}
        </select>

        <div class="check-row">
            <input type="checkbox" name="es_admin" id="es_admin" value="1">
            <label for="es_admin">Admin Total (acceso completo al sistema)</label>
        </div>

        <button type="submit" class="btn-submit">Crear usuario</button>
        <a href="{% url 'lista_usuarios' %}" class="btn-cancel">Cancelar</a>
    </form>
</div>
{% endblock %}
