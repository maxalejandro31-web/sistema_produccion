{% extends 'base.html' %}

{% block title %}Captura Orden{% endblock %}

{% block content %}
<style>
    .contenedor {
        background: white;
        border-radius: 14px;
        padding: 25px;
        box-shadow: 0 2px 12px rgba(0,0,0,0.08);
        max-width: 1000px;
    }
    .grid {
        display: grid;
        grid-template-columns: repeat(2, 1fr);
        gap: 14px;
    }
    .campo {
        display: flex;
        flex-direction: column;
    }
    .campo label {
        font-weight: bold;
        margin-bottom: 6px;
    }
    .campo input,
    .campo select,
    .campo textarea {
        padding: 10px;
        border-radius: 8px;
        border: 1px solid #ccc;
    }
    .mensaje {
        background: #dff0d8;
        color: #2e7d32;
        padding: 10px;
        border-radius: 8px;
        margin-bottom: 15px;
    }
    .acciones {
        margin-top: 20px;
    }
    .acciones button,
    .acciones a {
        display: inline-block;
        padding: 10px 14px;
        border-radius: 8px;
        text-decoration: none;
        border: none;
        cursor: pointer;
        margin-right: 10px;
    }
    .acciones button {
        background: #2c3e50;
        color: white;
    }
    .acciones a {
        background: #95a5a6;
        color: white;
    }
</style>

<div class="contenedor">
    <h1>Captura de Orden</h1>

    {% if mensaje %}
        <div class="mensaje">{{ mensaje }}</div>
    {% endif %}

    <form method="post">
        {% csrf_token %}
        <div class="grid">
            {% for field in form %}
                <div class="campo">
                    <label>{{ field.label }}</label>
                    {{ field }}
                    {% if field.errors %}
                        <small style="color:red;">{{ field.errors }}</small>
                    {% endif %}
                </div>
            {% endfor %}
        </div>

        <div class="acciones">
            <button type="submit">Guardar orden</button>
            <a href="{% url 'lista_ordenes' %}">Ver órdenes</a>
        </div>
    </form>
</div>
{% endblock %}
