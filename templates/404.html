<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Página no encontrada — Sistema de Producción</title>
    <style>
        body { margin:0; font-family:Arial,sans-serif; background:#f4f6f8; display:flex; flex-direction:column; min-height:100vh; }
        .navbar { background:#1f2d3d; padding:14px 24px; color:white; font-size:18px; font-weight:bold; }
        .content { flex:1; display:flex; align-items:center; justify-content:center; padding:40px 24px; }
        .card { background:white; border-radius:16px; padding:48px 40px; text-align:center; max-width:480px; box-shadow:0 4px 20px rgba(0,0,0,0.1); }
        .code { font-size:80px; font-weight:bold; color:#e2e8f0; line-height:1; }
        h1 { font-size:24px; color:#1f2d3d; margin:8px 0 12px; }
        p { color:#6b7280; margin-bottom:28px; line-height:1.6; }
        a { display:inline-block; background:#1f2d3d; color:white; padding:12px 28px; border-radius:10px; text-decoration:none; font-weight:bold; margin:4px; }
        a:hover { background:#2c3e50; }
        a.sec { background:#6b7280; }
    </style>
</head>
<body>
    <div class="navbar">Sistema Control de Producción</div>
    <div class="content">
        <div class="card">
            <div class="code">404</div>
            <h1>Página no encontrada</h1>
            <p>La página que buscas no existe o fue movida.<br>Verifica la dirección o regresa al inicio.</p>
            <a href="/">Ir al Dashboard</a>
            <a href="javascript:history.back()" class="sec">Regresar</a>
        </div>
    </div>
</body>
</html>
